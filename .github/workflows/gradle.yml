# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    - name: Collect jars
      run: |
        mkdir artifacts

        for dir in mc*; do
          if [ -d "$dir" ]; then
            version=$(echo "$dir" | sed 's/^mc//')

            jar=$(find "$dir/build/libs" \
              -type f \
              -name "*.jar" \
              ! -name "*-sources.jar" \
              ! -name "*-javadoc.jar" \
              ! -name "*-dev.jar" \
              | head -n 1)

            if [ -n "$jar" ]; then
              cp "$jar" "artifacts/better-hotbar-hide-${version}.jar"
            fi
          fi
        done

    - name: Upload 1.21.7
      if: hashFiles('artifacts/better-hotbar-hide-1.21.7.jar') != ''
      uses: actions/upload-artifact@v4
      with:
        name: better-hotbar-hide-1.21.7
        path: artifacts/better-hotbar-hide-1.21.7.jar

    - name: Upload 1.21.8
      if: hashFiles('artifacts/better-hotbar-hide-1.21.8.jar') != ''
      uses: actions/upload-artifact@v4
      with:
        name: better-hotbar-hide-1.21.8
        path: artifacts/better-hotbar-hide-1.21.8.jar

